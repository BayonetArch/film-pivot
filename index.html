<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="vie/port" content="width=device-width, initial-scale=1" />
    <title>Film Pivot</title>
    <link href="css/style.css" rel="stylesheet" />
    <script src="script/index.js" type="module" defer></script>
  </head>
  <body>
    <form id="search-form">
      <div class="search-wrap">
        <input
          type="text"
          name="Search"
          placeholder="search for movies... "
          id="search"
          autofocus
        />
        <svg
          class="search-icon"
          id="search-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="10.5" cy="10.5" r="7.5"></circle>
          <line x1="21" y1="21" x2="15.8" y2="15.8"></line>
        </svg>
      </div>
    </form>
    <div class="loader" id="loader"></div>
    <div id="res_wrapper">
      <div id="result"></div>
    </div>
    <div id="error"></div>
    <div class="theme-switcher" id="theme-switcher">
      <svg
        class="sun-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <title>Enable light Mode</title>
        <circle cx="12" cy="12" r="5" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
        />
      </svg>
      <svg
        class="moon-icon"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <title>Enable Dark Mode</title>
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    </div>
  </body>
</html>
